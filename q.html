<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月亮 · 新址导航</title>
    <!-- 简单风格，强调紧迫感与引导 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b0c1a 0%, #1a1f35 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 1.5rem;
            margin: 0;
            color: #e9f1ff;
        }

        .card {
            max-width: 520px;
            width: 100%;
            background: rgba(18, 22, 48, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(120, 140, 255, 0.25);
            border-radius: 48px;
            padding: 2.5rem 2rem 2.8rem;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(200, 220, 255, 0.1) inset;
            text-align: center;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: scale(1.01);
            border-color: rgba(180, 160, 255, 0.5);
            box-shadow: 0 40px 60px rgba(0, 10, 30, 0.9), 0 0 0 1px #a9bfff33 inset;
        }

        /* 月亮图标 + 失联标志 */
        .moon-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 1rem;
            position: relative;
        }

        .moon-icon {
            font-size: 3.4rem;
            filter: drop-shadow(0 0 12px #8aabff);
            animation: soft-float 4s infinite alternate;
        }

        .qq-badge {
            background: #bb3b4d;
            color: white;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 0.3rem 0.9rem;
            border-radius: 60px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #691c28;
            transform: rotate(2deg);
            border: 1px solid #ffb0bb;
            margin-left: 5px;
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 0.4rem;
            background: linear-gradient(135deg, #ffffff, #c5d6ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0, 10, 50, 0.7);
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 400;
            color: #b6caff;
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            flex-wrap: wrap;
            background: rgba(10, 15, 30, 0.6);
            padding: 0.5rem 1.2rem;
            border-radius: 80px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            border: 1px dashed #4d68b0;
        }

        .emergency-tag {
            background: #ffd966;
            color: #1a1f35;
            font-weight: 700;
            padding: 0.15rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
            margin-left: 6px;
        }

        .discord-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #5865f2;
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.5rem;
            padding: 1.2rem 1.5rem;
            border-radius: 80px;
            width: 100%;
            margin: 2.3rem 0 1.8rem;
            border: 2px solid #8ea1ff;
            box-shadow: 0 12px 0 #2f3b9e, 0 10px 25px #00000070;
            transition: all 0.1s cubic-bezier(0, 0.6, 0.4, 1);
            letter-spacing: 0.5px;
        }

        .discord-button:hover {
            background: #6572f5;
            transform: translateY(-3px);
            box-shadow: 0 15px 0 #2f3b9e, 0 15px 30px #000000a0;
            border-color: #c2d0ff;
        }

        .discord-button:active {
            transform: translateY(6px);
            box-shadow: 0 6px 0 #2f3b9e, 0 8px 20px black;
        }

        .discord-logo {
            width: 36px;
            height: 36px;
            filter: drop-shadow(0 2px 2px black);
        }

        .dc-link {
            font-family: monospace;
            background: #0c0f26;
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 500;
            color: #b9cdff;
            border: 1px solid #3d4f9a;
            word-break: break-all;
            display: inline-block;
            margin-bottom: 2rem;
            box-shadow: inset 0 2px 5px #0000005e;
        }

        .dc-link span {
            color: #ffd966;
            font-weight: 700;
            background: #1e2342;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            margin-left: 8px;
            font-size: 0.9rem;
        }

        .countdown-box {
            background: #11162ecc;
            border-radius: 60px;
            padding: 0.9rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #3355aa;
            margin: 1.5rem 0 1.2rem;
            flex-wrap: wrap;
            gap: 10px;
        }

        .countdown-label {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #9eb4fd;
        }

        .countdown-timer {
            font-family: 'Courier New', monospace;
            font-size: 2.1rem;
            font-weight: 800;
            background: #1b1f3f;
            padding: 0.2rem 1.3rem;
            border-radius: 40px;
            letter-spacing: 5px;
            color: #f9e57c;
            text-shadow: 0 0 8px #ffb347;
            border: 1px solid #f6c978;
        }

        .note {
            font-size: 1rem;
            color: #b0c2f0;
            background: #0000002e;
            padding: 0.8rem;
            border-radius: 30px;
            margin-top: 1.6rem;
            border: 1px solid #2c3866;
        }

        .note a {
            color: #ffdb8e;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 2px dotted #f0b34b;
        }

        .note a:hover {
            color: white;
            border-bottom: 2px solid #ffb347;
        }

        .footer-small {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #5d6da0;
        }

        @keyframes soft-float {
            0% { transform: translateY(0); }
            100% { transform: translateY(-6px); }
        }

        /* 模拟霓虹闪烁 */
        .blink-warning {
            animation: blink 2.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; text-shadow: 0 0 3px #ffb0b0; }
            50% { opacity: 0.6; text-shadow: 0 0 12px #ff5959; }
            100% { opacity: 1; text-shadow: 0 0 3px #ffb0b0; }
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 月亮 + QQ 阵亡标志 -->
        <div class="moon-header">
            <span class="moon-icon">🌙</span>
            <span class="qq-badge blink-warning">QQ ❌ 失联</span>
        </div>

        <!-- 主标题 -->
        <h1>月亮·紧急联络</h1>
        <div class="subtitle">
            <span>原QQ号无法使用</span>
            <span class="emergency-tag">立即归队</span>
        </div>

        <!-- Discord 大按钮 (直接可点) -->
        <a href="https://discord.gg/aJmg5PS7" 
           class="discord-button" 
           target="_blank" 
           rel="noopener noreferrer">
            <svg class="discord-logo" viewBox="0 0 127.14 96.36" fill="white" aria-hidden="true">
                <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22h0C129.24,53.35,122.09,29.11,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.08,53,91.08,65.69,84.69,65.69Z"/>
            </svg>
            <span>DC 立即加入</span>
        </a>

        <!-- 明文链接 (备用点击/复制) -->
        <div class="dc-link" onclick="copyDiscordLink()" style="cursor: pointer;" title="点击复制链接">
            discord.gg/aJmg5PS7 <span>📋 点我复制</span>
        </div>

        <!-- 倒计时视觉装饰 + 紧迫感 -->
        <div class="countdown-box">
            <span class="countdown-label">
                <span style="font-size:1.5rem;">⏳</span> 新群入口速加
            </span>
        </div>

        <!-- 补充说明和备用联系方式 -->
        <div class="note">
            💬 月亮QQ号已丢失，所有消息无法接收。<br>
            请立刻 <strong>进入Discord</strong> 取得新联系方式。<br>
            <span style="color:#aabcf0;">🔗 链接永久有效，如打不开请稍后重试</span><br>
            <a href="https://discord.gg/aJmg5PS7" target="_blank">👉 或点击此处备用跳转 👈</a>
        </div>

        <!-- 页脚 (模拟时间戳/版本) -->
        <div class="footer-small">
            🌙 月亮的导航页 · 即时更新 · 2025-02-25
        </div>
    </div>

    <!-- 简单倒计时脚本 + 复制功能 -->
    <script>
        (function() {
            // 倒计时：目标设置为当天的 23:59:59 (制造紧迫感，每日滚动)
            function getTodayEnd() {
                const now = new Date();
                return new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
            }

            function updateCountdown() {
                const now = new Date();
                const end = getTodayEnd();
                let diff = end - now; // 毫秒

                if (diff < 0) {
                    // 如果过了午夜，就直接显示 00:00:00 或者重新设定到次日? 这里简单重置到次日结束
                    // 但更优雅: 直接再加一天
                    const tomorrowEnd = new Date(end.getTime() + 24 * 60 * 60 * 1000);
                    diff = tomorrowEnd - now;
                }

                // 转换成 时:分:秒
                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                // 格式化为两位数
                const formatted = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                document.getElementById('countdown').innerText = formatted;
            }

            // 每秒更新
            updateCountdown();
            setInterval(updateCountdown, 1000);

            // 复制链接函数 (绑定在 dc-link 上)
            window.copyDiscordLink = function() {
                const link = "https://discord.gg/aJmg5PS7";
                navigator.clipboard.writeText(link).then(() => {
                    // 简单反馈 (可换成 alert 但太粗暴，用弹窗? 我们改变文字提示)
                    const copyEl = document.querySelector('.dc-link span');
                    const originalText = copyEl.innerText;
                    copyEl.innerText = '✅ 已复制!';
                    setTimeout(() => {
                        copyEl.innerText = originalText;
                    }, 2000);
                }).catch(() => {
                    // fallback: 提示手动复制
                    alert('无法自动复制，请手动选中链接复制: discord.gg/aJmg5PS7');
                });
            };
        })();
    </script>

    <!-- 额外确保 Discord 链接新页面打开 (已经写在a标签里) -->
</body>
</html>
